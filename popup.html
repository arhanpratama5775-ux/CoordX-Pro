<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoordX Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-void: #000000;
      --bg-card: rgba(10, 10, 15, 0.9);
      --border-color: rgba(80, 80, 100, 0.3);
      --text-primary: #e8e8f0;
      --text-secondary: rgba(200, 200, 220, 0.7);
      --text-muted: rgba(150, 150, 170, 0.5);
      --accent: #4a9eff;
      --accent-glow: rgba(74, 158, 255, 0.3);
      --success: #00e676;
      --warning: #ffab00;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-void);
      padding: 16px;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .popup-logo {
      font-size: 22px;
      filter: drop-shadow(0 0 8px rgba(74, 158, 255, 0.6));
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #4a9eff, #7c4dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .popup-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px rgba(0, 230, 118, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.inactive {
      background: var(--text-muted);
      box-shadow: none;
      animation: none;
    }

    .status-text {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .popup-coords {
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
    }

    .popup-coords.visible {
      display: block;
    }

    .popup-coords .coord-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .popup-coords .coord-line + .coord-line {
      margin-top: 4px;
    }

    .popup-coords .coord-key {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .popup-coords .coord-val {
      font-size: 13px;
      font-weight: 600;
      font-family: 'SF Mono', monospace;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .popup-actions {
      display: flex;
      gap: 8px;
    }

    .popup-btn {
      flex: 1;
      padding: 9px 0;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: center;
    }

    .popup-btn.primary {
      background: linear-gradient(135deg, var(--accent), #7c4dff);
      color: #fff;
      border: none;
    }

    .popup-btn.primary:hover {
      filter: brightness(1.15);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .popup-btn.secondary {
      background: var(--bg-card);
      color: var(--text-secondary);
    }

    .popup-btn.secondary:hover {
      color: var(--text-primary);
      border-color: rgba(74, 158, 255, 0.3);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-logo">🚀</span>
    <span class="popup-title">CoordX Pro</span>
  </div>

  <div class="popup-status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Auto-detect active</span>
  </div>

  <div class="popup-coords" id="popupCoords">
    <div class="coord-line">
      <span class="coord-key">LAT</span>
      <span class="coord-val" id="popupLat">—</span>
    </div>
    <div class="coord-line">
      <span class="coord-key">LNG</span>
      <span class="coord-val" id="popupLng">—</span>
    </div>
  </div>

  <div class="popup-actions">
    <button class="popup-btn primary" id="openPanelBtn">Open Panel</button>
    <button class="popup-btn secondary" id="toggleBtn">Pause</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
