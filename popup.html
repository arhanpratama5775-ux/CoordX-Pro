<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoordX Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f1117;
      --bg-card: #1a1d2e;
      --border-color: rgba(99, 102, 241, 0.15);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #6366f1;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    body {
      width: 280px;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-primary);
      padding: 16px;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .popup-logo {
      font-size: 24px;
    }

    .popup-title {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .popup-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.inactive {
      background: var(--text-muted);
      box-shadow: none;
      animation: none;
    }

    .status-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .popup-coords {
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 12px;
      display: none;
    }

    .popup-coords.visible {
      display: block;
    }

    .popup-coords .coord-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .popup-coords .coord-line + .coord-line {
      margin-top: 4px;
    }

    .popup-coords .coord-key {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .popup-coords .coord-val {
      font-size: 13px;
      font-weight: 600;
      font-family: 'SF Mono', monospace;
    }

    .popup-actions {
      display: flex;
      gap: 8px;
    }

    .popup-btn {
      flex: 1;
      padding: 9px 0;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .popup-btn.primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border: none;
    }

    .popup-btn.primary:hover {
      filter: brightness(1.1);
    }

    .popup-btn.secondary {
      background: var(--bg-card);
      color: var(--text-secondary);
    }

    .popup-btn.secondary:hover {
      color: var(--text-primary);
      border-color: var(--accent);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-logo">📍</span>
    <span class="popup-title">CoordX Pro</span>
  </div>

  <div class="popup-status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Tracking active</span>
  </div>

  <div class="popup-coords" id="popupCoords">
    <div class="coord-line">
      <span class="coord-key">LAT</span>
      <span class="coord-val" id="popupLat">—</span>
    </div>
    <div class="coord-line">
      <span class="coord-key">LNG</span>
      <span class="coord-val" id="popupLng">—</span>
    </div>
  </div>

  <div class="popup-actions">
    <button class="popup-btn primary" id="openPanelBtn">Open Panel</button>
    <button class="popup-btn secondary" id="toggleBtn">Pause</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
